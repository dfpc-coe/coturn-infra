# COTURN Configuration File
# For more information, see: https://github.com/coturn/coturn/blob/master/turnserver.conf

# Listening port
listening-port=3478

# TLS Listening port
tls-listening-port=5349

# Disable Old TLS versions
no-tlsv1
no-tlsv1_1

# Listening address (0.0.0.0 for all interfaces)
listening-ip=0.0.0.0

# Relay address (for NAT traversal)
relay-ip=0.0.0.0

# External IP address (if behind NAT)
# external-ip=<your-public-ip>

# Realm for TURN
realm=turn.example.com

# Server ID
server-name=coturn

# Long-term credential mechanism
lt-cred-mech

# TURN users file (format: username:password)
# If not specified, uses environment variables
# user=<username>:<password>

# TURN secret for long-term credentials
turn-secret=${TURN_SECRET:-default-secret}

# Minimum and maximum port for relay addresses
min-port=49152
max-port=65535

# Log file
# log-file=/var/log/turn.log

# Verbose logging
verbose

# FQDN for STUN
fqdn=coturn.example.com

# Cipher list for TLS
cipher-list="ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384"

# Enable DTLS
dtls-listening-port=5349

# Certificate and private key for TLS
# cert=/etc/turn/cert.pem
# pkey=/etc/turn/key.pem

# Enable TCP relay
tcp-relay-port=3478

# DNS servers for STUN
# use-dns-servers

# No default routes
no-default-route

# Origin validation
no-multicast-peers

# No loopback interface
no-loopback-peers
