# COTURN Configuration File
# For more information, see: https://github.com/coturn/coturn/blob/master/turnserver.conf

# Listening port
listening-port=3478

# TLS Listening port (also handles DTLS)
tls-listening-port=5349

# Listening address (0.0.0.0 for all interfaces)
listening-ip=0.0.0.0

# Relay address (for NAT traversal)
relay-ip=0.0.0.0

# External IP address (public EIP - required for relay candidates behind NAT)
external-ip=${EXTERNAL_IP}

# Realm for TURN
realm=${TURN_REALM}

# Server ID
server-name=coturn

# TURN secret for REST API time-limited credentials
use-auth-secret
static-auth-secret=${TURN_SECRET}

# Minimum and maximum port for relay addresses
min-port=49152
max-port=65535

# Verbose logging
verbose

# Cipher list for TLS
cipher-list="ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384"

# Security Hardening
no-multicast-peers
no-rfc5780
no-software-attribute
